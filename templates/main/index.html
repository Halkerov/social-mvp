<!DOCTYPE html>
<html>
<head>
    <title>Блог</title>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <p>Привет, <strong>{{ user.username }}</strong>! | 
            <a href="{% url 'create_post' %}" style="color: green; font-weight: bold;">➕ Создать пост</a> | 
            <a href="{% url 'logout' %}">Выйти</a></p>
        {% else %}
            <p><a href="{% url 'login' %}">Войти</a> | <a href="{% url 'register' %}">Зарегистрироваться</a></p>
        {% endif %}
    </nav>
    <hr>
    <h1>Все посты</h1>
    {% for post in posts %}
        <h2><a href="{% url 'post_detail' post.id %}">{{ post.title }}</a></h2>
        <p><small>{{ post.created_at }} | Автор: {{ post.author.username }}</small></p>
    {% empty %}
        <p>Пока нет постов</p>
    {% endfor %}
</body>
</html>
