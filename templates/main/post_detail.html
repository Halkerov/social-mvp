<!DOCTYPE html>
<html>
<head>
    <title>{{ post.title }}</title>
</head>
<body>
    <h1>{{ post.title }}</h1>
    <p>
        <small>
            {{ post.created_at }}
            {% if post.author %}
                | Автор: <strong>{{ post.author.username }}</strong>
            {% endif %}
        </small>
    </p>
    <hr>
    <p>{{ post.content }}</p>
    <hr>
    <a href="/">Назад к списку постов</a>
</body>
</html>
