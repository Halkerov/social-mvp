<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
</head>
<body>
    <h1>Вход в систему</h1>
    
    {% if form.errors %}
        <div style="color: red;">
            <p>Неправильное имя пользователя или пароль!</p>
        </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div>
            <label>Имя пользователя:</label><br>
            <input type="text" name="username" required style="width: 300px; padding: 5px;">
        </div>
        <br>
        <div>
            <label>Пароль:</label><br>
            <input type="password" name="password" required style="width: 300px; padding: 5px;">
        </div>
        <br>
        <button type="submit" style="padding: 10px 20px;">Войти</button>
    </form>
    <br>
    <p><a href="/register/" style="color: blue; text-decoration: underline;">Нет аккаунта? Зарегистрироваться</a></p>
</body>
</html>
